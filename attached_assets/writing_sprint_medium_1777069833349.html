<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Sprint</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1b26;
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.09);
    --surface3: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.10);
    --border-hover: rgba(255,255,255,0.22);
    --text: rgba(255,255,255,0.95);
    --text-sub: rgba(255,255,255,0.48);
    --text-dim: rgba(255,255,255,0.28);
  }

  body {
    background: var(--bg);
    font-family: "DM Sans", sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    color: var(--text);
  }

  .bg-orb {
    position: fixed; border-radius: 50%;
    filter: blur(100px); pointer-events: none; z-index: 0;
  }
  .orb1 {
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(100,95,160,0.22) 0%, transparent 65%);
    top: -180px; right: -140px;
  }
  .orb2 {
    width: 460px; height: 460px;
    background: radial-gradient(circle, rgba(60,55,100,0.28) 0%, transparent 70%);
    bottom: -100px; left: -100px;
  }
  .orb3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(80,75,130,0.15) 0%, transparent 70%);
    top: 38%; left: -50px;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 52px 52px;
  }

  .bg-ring {
    position: fixed; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 0; pointer-events: none;
  }
  .ring1 { width: 720px; height: 720px; border: 1px solid rgba(255,255,255,0.05); }
  .ring2 { width: 500px; height: 500px; border: 1px solid rgba(255,255,255,0.03); }

  .app-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    padding: 28px 20px;
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .logo-img {
    width: 80px; height: 80px; border-radius: 22px; display: block;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 16px 48px rgba(0,0,0,0.6);
    animation: logoFloat 5s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%,100% { transform: translateY(0); box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 16px 48px rgba(0,0,0,0.6); }
    50% { transform: translateY(-7px); box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 24px 56px rgba(0,0,0,0.5); }
  }

  .headline { text-align: center; margin-bottom: 8px; }
  .headline h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 3rem; font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em; line-height: 1.05;
  }
  .headline p {
    font-size: 0.93rem; color: var(--text-sub);
    font-weight: 300; letter-spacing: 0.03em; margin-top: 8px;
    font-style: italic;
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 0 18px; padding: 0 2px;
  }

  .coins {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 14px 5px 7px;
    font-weight: 600; font-size: 0.88rem; color: var(--text);
  }
  .coin-icon {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #3a3850 0%, #2a2840 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 800;
  }

  .username-wrap { position: relative; }
  .username-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px; padding: 7px 14px 7px 12px;
    font-family: "DM Sans", sans-serif;
    font-size: 0.88rem; font-weight: 600; color: var(--text);
    cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: all 0.2s;
  }
  .username-btn:hover { background: var(--surface2); border-color: var(--border-hover); }
  .username-btn svg { color: var(--text-dim); }

  .signout-btn {
    background: none; border: none;
    display: flex; align-items: center; gap: 6px;
    color: var(--text-sub); font-size: 0.83rem;
    font-family: "DM Sans", sans-serif;
    cursor: pointer; transition: color 0.2s;
  }
  .signout-btn:hover { color: var(--text); }

  .tab-nav {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 4px; margin-bottom: 18px;
  }
  .tab-btn {
    flex: 1; background: none; border: none;
    font-family: "DM Sans", sans-serif;
    font-size: 0.82rem; font-weight: 500; color: var(--text-sub);
    padding: 9px 6px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.22s;
  }
  .tab-btn.active {
    background: var(--surface3); color: var(--text); font-weight: 600;
    border: 1px solid var(--border-hover);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .card {
    background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 22px; padding: 28px 26px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 24px 64px rgba(0,0,0,0.4);
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    border-radius: 999px;
  }

  .sprint-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border-hover);
    border-radius: 999px; padding: 4px 12px;
    font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em; margin-bottom: 16px; text-transform: uppercase;
  }
  .badge-dot {
    width: 5px; height: 5px;
    background: rgba(255,255,255,0.65); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  .card-title {
    font-family: "Playfair Display", serif;
    font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 4px;
  }
  .card-sub { font-size: 0.84rem; color: var(--text-sub); margin-bottom: 22px; }
  .card-sub strong { color: var(--text); font-weight: 600; }

  .mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 3px; margin-bottom: 22px;
  }
  .mode-btn {
    flex: 1; border: none; background: none;
    font-family: "DM Sans", sans-serif;
    font-size: 0.88rem; font-weight: 500; color: var(--text-sub);
    padding: 10px; border-radius: 9px; cursor: pointer; transition: all 0.22s;
  }
  .mode-btn.active {
    background: var(--surface3); color: var(--text); font-weight: 700;
    border: 1px solid var(--border-hover);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .input-label {
    font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .code-input {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 13px; padding: 14px 18px;
    font-family: "DM Sans", monospace;
    font-size: 1rem; letter-spacing: 0.12em;
    color: var(--text); text-align: center; outline: none;
    transition: all 0.22s; margin-bottom: 20px; display: block;
    caret-color: white;
  }
  .code-input::placeholder { color: var(--text-dim); letter-spacing: 0.14em; }
  .code-input:focus {
    border-color: var(--border-hover);
    background: rgba(0,0,0,0.3);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }

  .cta-btn {
    width: 100%;
    background: rgba(255,255,255,0.95);
    border: none; border-radius: 14px; padding: 16px;
    color: #1c1b26; font-family: "DM Sans", sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 0.01em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.6) inset;
    transition: all 0.22s; position: relative; overflow: hidden;
  }
  .cta-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent 60%);
    pointer-events: none;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.5);
    background: #ffffff;
  }
  .cta-btn:active { transform: translateY(0); }

  .dropdown {
    position: absolute;
    top: calc(100% + 10px); left: 50%; transform: translateX(-50%);
    background: #252435;
    border: 1px solid var(--border-hover);
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    padding: 8px; min-width: 220px; z-index: 100;
    display: none; animation: dropIn 0.18s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px) scale(0.97); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }
  .dropdown.open { display: block; }
  .dropdown-divider { height: 1px; background: var(--border); margin: 6px 4px; }
  .dropdown-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 10px;
    font-size: 0.88rem; font-weight: 500; color: var(--text);
    cursor: pointer; transition: background 0.15s;
  }
  .dropdown-item:hover { background: var(--surface2); }
  .dropdown-item svg { color: var(--text-sub); flex-shrink: 0; }
</style>
</head>

  <div class="headline">
    <h1>Writing Sprint</h1>
    <p>Race against fellow writers. Find your flow.</p>
  </div>

  <div class="top-bar">
    <div class="coins">
      <div class="coin-icon">✦</div>
      0
    </div>
    <div class="username-wrap">
      <button class="username-btn" id="userBtn" onclick="toggleDropdown()">
        Entrail
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown" id="dropdown">
        <div class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit writer name
        </div>
        <div class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          My Files
        </div>
        <div class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Friends
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Shop
        </div>
        <div class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </div>
      </div>
    </div>
    <button class="signout-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="setTab(this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Sprint
    </button>
    <button class="tab-btn" onclick="setTab(this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8" stroke-dasharray="3 2"/></svg>
      Active Rooms
    </button>
    <button class="tab-btn" onclick="setTab(this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Past Sprints
    </button>
  </div>

  <div class="card">
    <div class="sprint-badge">
      <div class="badge-dot"></div>
      Session open
    </div>
    <div class="card-title">Join the session</div>
    <div class="card-sub">Writing as <strong>Entrail</strong></div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="joinBtn" onclick="setMode('join')">Join Room</button>
      <button class="mode-btn" id="createBtn" onclick="setMode('create')">Create Room</button>
    </div>

    <div class="input-label" id="inputLabel">Room Code</div>
    <input class="code-input" id="codeInput" type="text" placeholder="SPRINT-XXXX" maxlength="12" oninput="this.value=this.value.toUpperCase()">

    <button class="cta-btn" id="ctaBtn">Enter Room &nbsp;→</button>
  </div>
</div>

<script>
  function toggleDropdown() {
    const d = document.getElementById("dropdown");
    d.classList.toggle("open");
    setTimeout(() => {
      document.addEventListener("click", function handler(e) {
        if (!document.getElementById("userBtn").contains(e.target)) {
          d.classList.remove("open");
          document.removeEventListener("click", handler);
        }
      });
    }, 10);
  }
  function setTab(el) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
  }
  function setMode(mode) {
    document.getElementById("joinBtn").classList.toggle("active", mode === "join");
    document.getElementById("createBtn").classList.toggle("active", mode === "create");
    const input = document.getElementById("codeInput");
    const label = document.getElementById("inputLabel");
    const btn = document.getElementById("ctaBtn");
    if (mode === "create") {
      input.placeholder = "Room name...";
      input.style.letterSpacing = "0.02em";
      label.textContent = "Room Name";
      btn.textContent = "Create Room  ✦";
    } else {
      input.placeholder = "SPRINT-XXXX";
      input.style.letterSpacing = "0.12em";
      label.textContent = "Room Code";
      btn.textContent = "Enter Room  →";
    }
  }
</script>
</body>
