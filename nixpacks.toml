[phases.setup]
cmds = ["corepack enable", "corepack prepare pnpm@10.26.1 --activate"]

[phases.install]
cmds = ["echo 'install handled in build phase'"]

[phases.build]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/writing-sprint run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
