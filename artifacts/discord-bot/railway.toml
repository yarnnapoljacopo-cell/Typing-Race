[build]
builder = "NIXPACKS"
# NODE_ENV=development ensures devDependencies (tsx) are installed
# The Discord bot runs TypeScript directly via tsx — no compile step needed
buildCommand = "NODE_ENV=development pnpm install --frozen-lockfile"

[deploy]
startCommand = "pnpm --filter @workspace/discord-bot start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
