directories:
  output: release
  buildResources: build
appId: com.writingsprint.app
productName: Writing Sprint
copyright: Writing Sprint
asar: false
icon: /home/runner/workspace/artifacts/desktop-app/resources/icon.png
files:
  - filter:
      - build/**/*
      - package.json
extraResources:
  - from: src/offline.html
    to: offline.html
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
electronVersion: 30.5.1
