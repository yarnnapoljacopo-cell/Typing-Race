[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile && (pnpm --filter @workspace/db push || echo 'DB push skipped') && PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/writing-sprint run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
