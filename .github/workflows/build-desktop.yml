name: Build and Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        working-directory: artifacts/desktop-app
        run: pnpm run build:mac:ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        working-directory: artifacts/desktop-app
        run: pnpm run build:win:ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-linux:
    name: Build Linux (.AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Linux build tools
        run: sudo apt-get install -y build-essential python3 libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux app
        working-directory: artifacts/desktop-app
        run: pnpm run build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if echo "$TAG" | grep -q '-'; then PRERELEASE="--prerelease"; fi

          cat > /tmp/notes.md << 'NOTES_EOF'
          ## What's Changed

          ${{ steps.changelog.outputs.CHANGELOG }}

          ---

          ## Downloads

          | Platform | File | Auto-updates |
          |----------|------|-------------|
          | Windows  | `.exe` — NSIS installer | ✅ Built in |
          | macOS    | `.dmg` — drag to Applications | Manual |
          | Linux    | `.AppImage` — `chmod +x` then run | ✅ Built in |

          > **Windows & Linux:** The app checks for updates automatically on launch and prompts you to restart when one is ready.
          >
          > **First time on Linux?** `chmod +x Writing-Sprint-*.AppImage && ./Writing-Sprint-*.AppImage`
          NOTES_EOF

          # Create release if it doesn't exist yet; edit it if electron-builder already made a draft
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Writing Sprint $TAG" \
              --notes-file /tmp/notes.md \
              --draft=false \
              $PRERELEASE
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Writing Sprint $TAG" \
              --notes-file /tmp/notes.md \
              $PRERELEASE
          fi
